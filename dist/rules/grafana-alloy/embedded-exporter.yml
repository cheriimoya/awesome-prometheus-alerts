groups:

- name: EmbeddedExporter

  rules:

    - alert: GrafanaAlloyServiceDown
      expr: 'count by (instance) (alloy_build_info) unless count by (instance) (alloy_build_info offset 2m)  '
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "{{ $labels.alias }}: Grafana Alloy service down"
        description: "Alloy is not responding or has stopped running.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"

