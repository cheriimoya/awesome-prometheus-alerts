groups:

- name: EmbeddedExporter

  # OpenTelemetry Collector self-monitoring metrics are exposed on port 8888 by default at the /metrics endpoint.
  # These alerts monitor the collector's health when metrics are ingested via the Prometheus OTLP endpoint or scraped directly.
  # All collector internal metrics are prefixed with 'otelcol_'.
  
  rules:

    - alert: OpentelemetryCollectorDown
      expr: 'up{job=~".*otel.*collector.*"} == 0'
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: OpenTelemetry Collector down"
        description: "OpenTelemetry Collector instance has disappeared or is not being scraped\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: OpentelemetryCollectorReceiverRefusedSpans
      expr: 'rate(otelcol_receiver_refused_spans[5m]) > 0'
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: OpenTelemetry Collector receiver refused spans"
        description: "OpenTelemetry Collector is refusing spans on {{ $labels.receiver }}\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: OpentelemetryCollectorReceiverRefusedMetricPoints
      expr: 'rate(otelcol_receiver_refused_metric_points[5m]) > 0'
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: OpenTelemetry Collector receiver refused metric points"
        description: "OpenTelemetry Collector is refusing metric points on {{ $labels.receiver }}\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: OpentelemetryCollectorReceiverRefusedLogRecords
      expr: 'rate(otelcol_receiver_refused_log_records[5m]) > 0'
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: OpenTelemetry Collector receiver refused log records"
        description: "OpenTelemetry Collector is refusing log records on {{ $labels.receiver }}\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: OpentelemetryCollectorExporterFailedSpans
      expr: 'rate(otelcol_exporter_send_failed_spans[5m]) > 0'
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: OpenTelemetry Collector exporter failed spans"
        description: "OpenTelemetry Collector failing to send spans via {{ $labels.exporter }}\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: OpentelemetryCollectorExporterFailedMetricPoints
      expr: 'rate(otelcol_exporter_send_failed_metric_points[5m]) > 0'
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: OpenTelemetry Collector exporter failed metric points"
        description: "OpenTelemetry Collector failing to send metric points via {{ $labels.exporter }}\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: OpentelemetryCollectorExporterFailedLogRecords
      expr: 'rate(otelcol_exporter_send_failed_log_records[5m]) > 0'
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: OpenTelemetry Collector exporter failed log records"
        description: "OpenTelemetry Collector failing to send log records via {{ $labels.exporter }}\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: OpentelemetryCollectorExporterQueueNearlyFull
      expr: '(otelcol_exporter_queue_size / on(instance, job, exporter) otelcol_exporter_queue_capacity) > 0.8 and otelcol_exporter_queue_capacity > 0'
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: OpenTelemetry Collector exporter queue nearly full"
        description: "OpenTelemetry Collector exporter {{ $labels.exporter }} queue is over 80% full\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: OpentelemetryCollectorProcessorRefusedSpans
      expr: 'rate(otelcol_processor_refused_spans[5m]) > 0'
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: OpenTelemetry Collector processor refused spans"
        description: "OpenTelemetry Collector processor {{ $labels.processor }} is refusing spans, likely due to backpressure\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: OpentelemetryCollectorProcessorRefusedMetricPoints
      expr: 'rate(otelcol_processor_refused_metric_points[5m]) > 0'
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: OpenTelemetry Collector processor refused metric points"
        description: "OpenTelemetry Collector processor {{ $labels.processor }} is refusing metric points, likely due to backpressure\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: OpentelemetryCollectorHighMemoryUsage
      expr: '(otelcol_process_runtime_heap_alloc_bytes{job=~".*otel.*collector.*"} / on(instance, job) otelcol_process_runtime_total_sys_memory_bytes{job=~".*otel.*collector.*"}) > 0.9'
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: OpenTelemetry Collector high memory usage"
        description: "OpenTelemetry Collector memory usage is above 90%\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: OpentelemetryCollectorOtlpReceiverErrors
      expr: 'rate(otelcol_receiver_accepted_spans{receiver=~"otlp"}[5m]) == 0 and rate(otelcol_receiver_refused_spans{receiver=~"otlp"}[5m]) > 0'
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: OpenTelemetry Collector OTLP receiver errors"
        description: "OpenTelemetry Collector OTLP receiver is completely failing - all spans are being refused\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

