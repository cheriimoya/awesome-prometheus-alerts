groups:

- name: GesellixCouchdbPrometheusExporter

  
  rules:

    - alert: CouchdbNodeDown
      expr: 'couchdb_httpd_node_up == 0 or couchdb_httpd_up == 0'
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB node down"
        description: "CouchDB node is not responding (node_up metric is 0) for more than 2 minutes\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbAtomMemoryUsageCritical
      expr: 'couchdb_erlang_memory_atom_used > 0.9 * couchdb_erlang_memory_atom'
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB atom memory usage critical"
        description: "Atom memory usage is above 90% of limit\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbOpenDatabasesCritical
      expr: 'couchdb_httpd_open_databases > 0.9 * 1000'
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB open databases critical"
        description: "Number of open databases exceeds 90% of node capacity\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbOpenOsFilesCritical
      expr: 'couchdb_httpd_open_os_files > 0.9 * 65535'
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB open OS files critical"
        description: "CouchDB is using more than 90% of allowed OS file descriptors, may fail to open new files\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: Couchdb5xxErrorRatioHigh
      expr: 'rate(couchdb_httpd_status_codes{code=~"5.."}[5m]) / rate(couchdb_httpd_requests[5m]) > 0.05'
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB 5xx error ratio high"
        description: "More than 5% of HTTP requests are returning 5xx errors\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbTemporaryViewReadRateCritical
      expr: 'rate(couchdb_httpd_temporary_view_reads[5m]) > 100'
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB temporary view read rate critical"
        description: "Temporary view read rate exceeds 100 reads/sec, high risk of performance degradation\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbMangoQueriesScanningTooManyDocs
      expr: 'rate(couchdb_mango_too_many_docs_scanned[5m]) > 50'
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB Mango queries scanning too many docs"
        description: "Some Mango queries are scanning too many documents, consider adding indexes\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbMangoQueriesFailedDueToInvalidIndex
      expr: 'rate(couchdb_mango_query_invalid_index[5m]) > 5'
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB Mango queries failed due to invalid index"
        description: "Some Mango queries failed to execute because the index was missing or invalid\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbMangoDocsExaminedHigh
      expr: 'rate(couchdb_mango_docs_examined[5m]) > 1000'
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB Mango docs examined high"
        description: "High number of documents examined per Mango queries, consider indexing\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbReplicatorManagerDied
      expr: 'increase(couchdb_replicator_changes_manager_deaths[5m]) > 0'
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB Replicator manager died"
        description: "Replication manager process has crashed\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbReplicatorQueueProcessDied
      expr: 'increase(couchdb_replicator_changes_queue_deaths[5m]) > 0'
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB Replicator queue process died"
        description: "Replication queue process has crashed\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbReplicatorReaderProcessDied
      expr: 'increase(couchdb_replicator_changes_reader_deaths[5m]) > 0'
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB Replicator reader process died"
        description: "Replication reader process has crashed\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbReplicatorFailedToStart
      expr: 'increase(couchdb_replicator_failed_starts[5m]) > 0'
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB Replicator failed to start"
        description: "One or more replication tasks failed to start\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbReplicationClusterUnstable
      expr: 'couchdb_replicator_cluster_is_stable == 0'
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB replication cluster unstable"
        description: "The replication cluster is unstable, replication may be interrupted\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbReplicationReadFailures
      expr: 'increase(couchdb_replicator_changes_read_failures[5m]) > 5'
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB replication read failures"
        description: "Replication changes feed has failed reads more than 5 times in 5 minutes\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbFileDescriptorsHigh
      expr: 'process_open_fds / process_max_fds > 0.85'
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB file descriptors high"
        description: "Process is using more than 85% of allowed file descriptors\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbProcessRestarted
      expr: 'changes(process_start_time_seconds[1h]) > 0'
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB process restarted"
        description: "CouchDB process has restarted recently\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: CouchdbCriticalLogEntries
      expr: 'increase(couchdb_server_couch_log{level=~"error|critical"}[5m]) > 0'
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: CouchDB critical log entries"
        description: "Critical or error log entries detected in the last 5 minutes\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

