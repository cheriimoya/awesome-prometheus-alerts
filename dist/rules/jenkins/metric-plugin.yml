groups:

- name: MetricPlugin

  
  rules:

    - alert: JenkinsNodeOffline
      expr: 'jenkins_node_offline_value > 0'
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: Jenkins node offline"
        description: "At least one Jenkins node offline: `{{$labels.instance}}` in realm {{$labels.realm}}/{{$labels.env}} ({{$labels.region}})\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: JenkinsNoNodeOnline
      expr: 'jenkins_node_online_value == 0'
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: Jenkins no node online"
        description: "No Jenkins nodes are online: `{{$labels.instance}}` in realm {{$labels.realm}}/{{$labels.env}} ({{$labels.region}})\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: JenkinsHealthcheck
      expr: 'jenkins_health_check_score < 1'
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: Jenkins healthcheck"
        description: "Jenkins healthcheck score: {{$value}}. Healthcheck failure for `{{$labels.instance}}` in realm {{$labels.realm}}/{{$labels.env}} ({{$labels.region}})\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: JenkinsOutdatedPlugins
      expr: 'sum(jenkins_plugins_withUpdate) by (instance) > 3'
      for: 1d
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: Jenkins outdated plugins"
        description: "{{ $value }} plugins need update\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: JenkinsBuildsHealthScore
      expr: 'default_jenkins_builds_health_score < 1'
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: Jenkins builds health score"
        description: "Healthcheck failure for `{{$labels.instance}}` in realm {{$labels.realm}}/{{$labels.env}} ({{$labels.region}})\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: JenkinsRunFailureTotal
      expr: 'delta(jenkins_runs_failure_total[1h]) > 100'
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: Jenkins run failure total"
        description: "Job run failures: ({{$value}}) {{$labels.jenkins_job}}. Healthcheck failure for `{{$labels.instance}}` in realm {{$labels.realm}}/{{$labels.env}} ({{$labels.region}})\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    - alert: JenkinsBuildTestsFailing
      expr: 'default_jenkins_builds_last_build_tests_failing > 0'
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: Jenkins build tests failing"
        description: "Last build tests failed: {{$labels.jenkins_job}}. Failed build Tests for job `{{$labels.jenkins_job}}` on {{$labels.instance}}/{{$labels.env}} ({{$labels.region}})\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

    # * RUNNING  -1 true  - The build had no errors.
    # * SUCCESS   0 true  - The build had no errors.
    # * UNSTABLE  1 true  - The build had some errors but they were not fatal. For example, some tests failed.
    # * FAILURE   2 false - The build had a fatal error.
    # * NOT_BUILT 3 false - The module was not built.
    # * ABORTED   4 false - The build was manually aborted.
    - alert: JenkinsLastBuildFailed
      expr: 'default_jenkins_builds_last_build_result_ordinal == 2'
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "{{ if $labels.alias }}{{ $labels.alias }}{{ else }}{{ $labels.instance }}{{ end }}: Jenkins last build failed"
        description: "Last build failed: {{$labels.jenkins_job}}. Failed build for job `{{$labels.jenkins_job}}` on {{$labels.instance}}/{{$labels.env}} ({{$labels.region}})\nVALUE = {{ $value }}\n{{ range $k, $v := $labels }}{{ $k }}=\"{{ $v }}\" {{ end }}"

